<!DOCTYPE html>
<html>
<head>
  <title>API Fetcher</title>
</head>
<body>
  <script>
    const apiKey = "1Gl790cxhBjGKExT6NTZxzmEdmUjlO88idX5oto3ITBoqBh1uMtVMC4mF20RzdO0";
    const url = "https://api.diceblox.com/affiliates/2024-05-17T00:00:00+01:00";

    fetch(url, {
      headers: {
        "Authorization": apiKey
      }
    })
    .then(response => response.json())
    .then(data => {
      console.log("API Data:", data);
    })
    .catch(error => {
      console.error("Error fetching API data:", error);
    });
  </script>
</body>
</html>
