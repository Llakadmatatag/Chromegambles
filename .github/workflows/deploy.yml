name: Build and Deploy

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        persist-credentials: false

    # Disabled Firebase Config generation to use the manually configured file
    # - name: Generate Firebase Config
    #   run: |
    #     mkdir -p js
    #     cat > js/firebase-config.js << EOF
    #     // This file is auto-generated during the build process
    #     const firebaseConfig = {
    #       apiKey: "${{ secrets.FIREBASE_API_KEY }}",
    #       authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
    #       projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
    #       storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
    #       messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
    #       appId: "${{ secrets.FIREBASE_APP_ID }}",
    #       measurementId: "${{ secrets.FIREBASE_MEASUREMENT_ID }}"
    #     };
    #
    #     // Initialize Firebase
    #     firebase.initializeApp(firebaseConfig);
    #     const db = firebase.firestore();
    #     EOF

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    - name: Install dependencies
      run: |
        npm install -g html-minifier-terser
        npm install -g clean-css-cli
        npm install -g terser

    - name: Optimize HTML files
      run: |
        find . -name "*.html" -type f -exec html-minifier-terser --collapse-whitespace --remove-comments --remove-optional-tags --remove-redundant-attributes --remove-script-type-attributes --remove-tag-whitespace --use-short-doctype --minify-css true --minify-js true -o {} {} \;

    - name: Optimize CSS files
      run: |
        find ./css -name "*.css" -type f -exec cleancss -o {} {} \;

    - name: Optimize JavaScript files
      run: |
        find ./js -name "*.js" -not -name "firebase-config.js" -type f -exec terser -c -m -o {} {} \;

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        force_orphan: true
